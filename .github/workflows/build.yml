name: Build EXE

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: allmyscripts.py
        pip install pyinstaller
        if exist requirements.txt pip install -r requirements.txt

    - name: Build EXE
      run: allmyscripts.py
        pyinstaller --onefile allmyscripts.py

    - name: Upload EXE
      uses: actions/upload-artifact@v3
      with:
        name: program
        path: dist/*scripts.exe
